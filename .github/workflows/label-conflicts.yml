name: Auto Label Merge Conflicts

on:
  push:
    branches:
      - master
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: label-conflicts-${{ github.repository }}-${{ github.event.pull_request.number || 'all' }}
  cancel-in-progress: true

jobs:
  label-conflicts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check and Label Conflicting PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          fetch_prs() {
            if [ -n "$PR_NUMBER" ]; then
              gh api graphql -f query='
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      number
                      title
                      mergeable
                      labels(first: 100) {
                        nodes { name }
                      }
                    }
                  }
                }' -F owner="${GH_REPO%/*}" -F repo="${GH_REPO#*/}" -F number="$PR_NUMBER" \
                | jq -c '[.data.repository.pullRequest] | map(select(. != null))'
            else
              gh api graphql -f query='
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequests(states: OPEN, first: 100) {
                      nodes {
                        number
                        title
                        mergeable
                        labels(first: 100) {
                          nodes { name }
                        }
                      }
                    }
                  }
                }' -F owner="${GH_REPO%/*}" -F repo="${GH_REPO#*/}" \
                | jq -c '.data.repository.pullRequests.nodes'
            fi
          }

          # GitHub may still be calculating mergeability immediately after a push.
          for attempt in {1..4}; do
            PRS=$(fetch_prs)
            UNKNOWN_COUNT=$(echo "$PRS" | jq -r '[.[] | select(.mergeable == "UNKNOWN")] | length')

            if [ "$UNKNOWN_COUNT" -eq 0 ] || [ "$attempt" -eq 4 ]; then
              break
            fi

            echo "Waiting 10s for GitHub to compute merge status for $UNKNOWN_COUNT PR(s)... (attempt $attempt/4)"
            sleep 10
          done

          TOTAL=$(echo "$PRS" | jq -r 'length')
          echo "Checking $TOTAL pull request(s)."

          if [ "$TOTAL" -eq 0 ]; then
            echo "No open PRs to process."
            exit 0
          fi

          echo "$PRS" | jq -c '.[]' | while read -r pr; do
            NUMBER=$(echo "$pr" | jq -r '.number')
            TITLE=$(echo "$pr" | jq -r '.title')
            MERGEABLE=$(echo "$pr" | jq -r '.mergeable')
            HAS_LABEL=$(echo "$pr" | jq -r 'any(.labels.nodes[]; .name == "Has Conflicts")')

            if [ "$MERGEABLE" = "CONFLICTING" ] && [ "$HAS_LABEL" = "false" ]; then
              echo "PR #$NUMBER ($TITLE) has conflicts -> Adding 'Has Conflicts' label"
              gh pr edit "$NUMBER" --add-label "Has Conflicts"
            elif [ "$MERGEABLE" = "MERGEABLE" ] && [ "$HAS_LABEL" = "true" ]; then
              echo "PR #$NUMBER ($TITLE) is clean -> Removing 'Has Conflicts' label"
              gh pr edit "$NUMBER" --remove-label "Has Conflicts"
            elif [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "PR #$NUMBER ($TITLE) still has conflicts -> Label unchanged"
            elif [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "PR #$NUMBER ($TITLE) is still clean -> Label unchanged"
            else
              echo "PR #$NUMBER ($TITLE) status is $MERGEABLE -> Skipping"
            fi
          done
