name: Auto Label Merge Conflicts

on:
  push:
    branches:
      - master
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: label-conflicts-${{ github.repository }}
  cancel-in-progress: true

jobs:
  label-conflicts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check and Label Conflicting PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Fetch open PRs via GraphQL, retrying if GitHub is calculating UNKNOWN statuses
          for attempt in {1..4}; do
            DATA=$(gh api graphql -f query='
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  pullRequests(states: OPEN, first: 100) {
                    totalCount
                    nodes {
                      number
                      title
                      mergeable
                      labels(first: 100) {
                        nodes { name }
                      }
                    }
                  }
                }
              }' -F owner="${GH_REPO%/*}" -F repo="${GH_REPO#*/}")

            UNKNOWN_COUNT=$(echo "$DATA" | jq -r '[.data.repository.pullRequests.nodes[] | select(.mergeable == "UNKNOWN")] | length')

            if [ "$UNKNOWN_COUNT" -eq 0 ] || [ "$attempt" -eq 4 ]; then
              break
            fi

            echo "Waiting 10s for GitHub to compute merge status for $UNKNOWN_COUNT PR(s)... (attempt $attempt/4)"
            sleep 10
          done

          TOTAL=$(echo "$DATA" | jq -r '.data.repository.pullRequests.totalCount // 0')
          echo "Found $TOTAL open pull requests."

          if [ "$TOTAL" -eq 0 ]; then
            echo "No open PRs to process."
            exit 0
          fi

          echo "$DATA" | jq -c '.data.repository.pullRequests.nodes[]' | while read -r pr; do
            NUMBER=$(echo "$pr" | jq -r '.number')
            TITLE=$(echo "$pr" | jq -r '.title')
            MERGEABLE=$(echo "$pr" | jq -r '.mergeable')
            HAS_LABEL=$(echo "$pr" | jq -r 'any(.labels.nodes[]; .name == "Needs Rebase")')

            if [ "$MERGEABLE" = "CONFLICTING" ] && [ "$HAS_LABEL" = "false" ]; then
              echo "PR #$NUMBER ($TITLE) has conflicts -> Adding 'Needs Rebase' label"
              gh pr edit "$NUMBER" --add-label "Needs Rebase"
            elif [ "$MERGEABLE" = "MERGEABLE" ] && [ "$HAS_LABEL" = "true" ]; then
              echo "PR #$NUMBER ($TITLE) is clean -> Removing 'Needs Rebase' label"
              gh pr edit "$NUMBER" --remove-label "Needs Rebase"
            elif [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "PR #$NUMBER ($TITLE) still has conflicts -> Label unchanged"
            elif [ "$MERGEABLE" = "MERGEABLE" ]; then
              echo "PR #$NUMBER ($TITLE) is still clean -> Label unchanged"
            else
              echo "PR #$NUMBER ($TITLE) status is $MERGEABLE -> Skipping"
            fi
          done
